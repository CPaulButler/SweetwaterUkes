name: Publish Music Archive

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  detect-publish-readiness:
    runs-on: ubuntu-latest

    outputs:
      should_publish: ${{ steps.decide.outputs.should_publish }}

    steps:
      - name: Check out repository
        if: github.event_name == 'push'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether publishing should wait for PDF generation
        id: decide
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == 'workflow_dispatch' ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Manual run requested; publishing immediately."
            exit 0
          fi

          if [[ "${{ github.ref_name }}" != "${{ github.event.repository.default_branch }}" ]]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Not on the default branch; skipping publish."
            exit 0
          fi

          if [[ "${{ github.actor }}" == 'github-actions[bot]' ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Bot-authored push detected; publishing immediately."
            exit 0
          fi

          if [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            mapfile -t changed_files < <(git ls-files)
          else
            mapfile -t changed_files < <(git diff --name-only --diff-filter=AMRT "${{ github.event.before }}" "${{ github.sha }}")
          fi

          declare -A pushed_files=()
          for path in "${changed_files[@]}"; do
            pushed_files["$path"]=1
          done

          for path in "${changed_files[@]}"; do
            case "$path" in
              *.chopro|*.cho)
                pdf_path="${path%.*}.pdf"
                if [[ -z "${pushed_files[$pdf_path]:-}" ]]; then
                  echo "should_publish=false" >> "$GITHUB_OUTPUT"
                  echo "Delaying publish until the PDF workflow finishes for $path."
                  exit 0
                fi
                ;;
            esac
          done

          echo "should_publish=true" >> "$GITHUB_OUTPUT"
          echo "No waiting PDF generation detected; publishing immediately."

  build:
    needs: detect-publish-readiness
    if: (github.event_name == 'workflow_dispatch' || github.ref_name == github.event.repository.default_branch) && needs.detect-publish-readiness.outputs.should_publish == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install genlist-butler with pipx
        run: |
          python -m pip install --user pipx
          python -m pipx install genlist-butler
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build GitHub Pages site
        run: |
          set -euo pipefail
          mkdir -p site
          cp -R music site/music
          cp favicon.svg site/favicon.svg
          genlist music site/index.html --no-intro
          touch site/.nojekyll


      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs:
      - detect-publish-readiness
      - build
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
