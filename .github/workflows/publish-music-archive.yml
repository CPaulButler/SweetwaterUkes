name: Publish Music Archive

on:
  workflow_run:
    workflows:
      - Update ChordPro PDFs
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == github.event.repository.default_branch)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository for manual publish
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out repository for completed PDF workflow
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install genlist-butler with pipx
        run: |
          python -m pip install --user pipx
          python -m pipx install genlist-butler
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build GitHub Pages site
        run: |
          set -euo pipefail
          mkdir -p site
          cp -R music site/music
          cp -R assets site/assets
          cp favicon.svg site/favicon.svg
          cp robots.txt site/robots.txt
          genlist music site/index.html --no-intro
          touch site/.nojekyll


      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
